plugins {
    id 'java-library'
    id 'maven-publish'
    id 'io.quarkus.extension'
}

dependencies {
    implementation platform("${quarkusPlatformGroupId}:${quarkusPlatformArtifactId}:${quarkusPlatformVersion}")
    api 'org.acme:ext-gp-e:1.0-SNAPSHOT'
}

quarkusExtension {
    deploymentArtifact = "org.acme:ext-gp-d-deployment:1.0-SNAPSHOT"
}

publishing {
    publications {
        mavenJave(MavenPublication) {
            groupId = 'org.acme'
            artifactId = 'ext-gp-d'
            version = '1.0-SNAPSHOT'
            from components.java
        }
    }
}
