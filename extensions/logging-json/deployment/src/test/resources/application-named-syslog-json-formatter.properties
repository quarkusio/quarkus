quarkus.log.level=INFO
quarkus.log.console.enabled=false
quarkus.log.syslog.json.enabled=false

# Named JSON syslog handler
quarkus.log.handler.syslog.json-syslog.enabled=true
quarkus.log.handler.syslog.json-syslog.endpoint=localhost:5140
quarkus.log.handler.syslog.json-syslog.json.enabled=true
quarkus.log.category."named.syslog.json".handlers=json-syslog
quarkus.log.category."named.syslog.json".use-parent-handlers=false

# Named plain syslog handler
quarkus.log.handler.syslog.plain-syslog.enabled=true
quarkus.log.handler.syslog.plain-syslog.endpoint=localhost:5141
quarkus.log.category."named.syslog.plain".handlers=plain-syslog
quarkus.log.category."named.syslog.plain".use-parent-handlers=false
