syntax = "proto3";

option java_multiple_files = true;
option java_package = "examples";

package helloworld;

service Greeter {
    rpc SayHello (HelloRequest) returns (HelloReply) {}
}

message HelloRequest {
    string name = 1;
}

message HelloReply {
    string message = 1;
    bool has_vertx_context = 2;
    bool is_duplicated_context = 3;
}
