quarkus.log.level=INFO
quarkus.log.console.enabled=false
quarkus.log.file.json.enabled=false

# Named JSON file handler
quarkus.log.handler.file.json-file.enabled=true
quarkus.log.handler.file.json-file.path=target/test-named-json-file.log
quarkus.log.handler.file.json-file.json.enabled=true
quarkus.log.category."named.file.json".handlers=json-file
quarkus.log.category."named.file.json".use-parent-handlers=false

# Named plain file handler
quarkus.log.handler.file.plain-file.enabled=true
quarkus.log.handler.file.plain-file.path=target/test-named-plain-file.log
quarkus.log.category."named.file.plain".handlers=plain-file
quarkus.log.category."named.file.plain".use-parent-handlers=false
