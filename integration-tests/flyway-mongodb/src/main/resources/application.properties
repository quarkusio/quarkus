quarkus.mongodb.devservices.enabled=false
quarkus.flyway-mongodb.migrate-at-start=true
quarkus.flyway-mongodb.placeholders.fruit-color=orange

# Named "secondary" client — connection-string set at test time via FlywayMongodbTestResource.
# `locations` deliberately uses the `classpath:` prefix and surrounds the second comma-separated
# entry with whitespace to verify that TrimmedStringConverter and prefix-stripping wire up
# correctly at IT level (and, when `-Dnative` is enabled, in native mode). If trimming were
# missing, the second entry would be searched for verbatim with whitespace and fail to find
# any migration files, which would silently succeed (failOnMissingLocations=false) but the
# trailing whitespace on the first entry would cause `testNamedClientMigration` to fail.
quarkus.mongodb.secondary.devservices.enabled=false
quarkus.flyway-mongodb.secondary.migrate-at-start=true
quarkus.flyway-mongodb.secondary.locations=classpath:db/secondary-migration   ,   classpath:db/secondary-migration

# Named "users" client — custom history collection name and index creation
quarkus.mongodb.users.devservices.enabled=false
quarkus.flyway-mongodb.users.migrate-at-start=true
quarkus.flyway-mongodb.users.locations=db/users-migration
quarkus.flyway-mongodb.users.collection=user_flyway_history

# Named "lazy" client — migration NOT triggered at start; invoked manually in tests
quarkus.mongodb.lazy.devservices.enabled=false
quarkus.flyway-mongodb.lazy.migrate-at-start=false
quarkus.flyway-mongodb.lazy.locations=db/lazy-migration

# Named "custom-ph" client — custom placeholder-prefix (#[) and placeholder-suffix (]) to mirror JDBC testPlaceholdersPrefixSuffix
quarkus.mongodb.custom-ph.devservices.enabled=false
quarkus.flyway-mongodb.custom-ph.migrate-at-start=true
quarkus.flyway-mongodb.custom-ph.locations=db/custom-ph-migration
quarkus.flyway-mongodb.custom-ph.placeholder-prefix=#[
quarkus.flyway-mongodb.custom-ph.placeholder-suffix=]
quarkus.flyway-mongodb.custom-ph.placeholders.primary-color=cyan

# Suppress INFO-level "Connection reset" noise from MongoDB driver monitor threads during test container shutdown
quarkus.log.category."org.mongodb.driver.cluster".level=WARN
