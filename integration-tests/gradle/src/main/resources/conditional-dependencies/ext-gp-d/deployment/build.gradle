plugins {
    id 'java-library'
    id 'maven-publish'
}

dependencies {
    implementation platform("${quarkusPlatformGroupId}:${quarkusPlatformArtifactId}:${quarkusPlatformVersion}")
    implementation 'io.quarkus:quarkus-core-deployment'
    implementation project(':ext-gp-d:runtime')
    implementation 'org.acme:ext-gp-e-deployment:1.0-SNAPSHOT'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = 'org.acme'
            artifactId = 'ext-gp-d-deployment'
            version = '1.0-SNAPSHOT'
            from components.java
        }
    }
}
