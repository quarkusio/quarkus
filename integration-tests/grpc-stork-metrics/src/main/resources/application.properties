quarkus.grpc.clients.hello.host=hello-service
quarkus.grpc.clients.hello.name-resolver=stork

quarkus.stork.hello-service.service-discovery.type=static
quarkus.stork.hello-service.service-discovery.address-list=localhost:9901
quarkus.stork.hello-service.load-balancer.type=round-robin

quarkus.micrometer.binder.stork.enabled=true

quarkus.http.test-port=9901
quarkus.grpc.clients.hello.test-port=9901

%vertx.quarkus.stork.hello-service.service-discovery.address-list=localhost:9902
%vertx.quarkus.http.test-port=9902
%vertx.quarkus.grpc.clients.hello.test-port=9902
