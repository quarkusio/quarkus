name: Quarkus Release Test Build

permissions:
  contents: read
  issues: write
  packages: read

on:
  schedule:
    - cron: '0 3 * * *'
env:
  LANG: en_US.UTF-8
  MVNW_REPOURL: https://maven-central.storage-download.googleapis.com/maven2
jobs:
  build:
    name: "Prepare release"
    runs-on: ubuntu-latest
    if: github.repository == 'quarkusio/quarkus'
    env:
      MAVEN_OPTS: -Xmx2560m
      JBANG_REPO: $HOME/release/repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
      - name: Get SHA
        id: quarkus-sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Reclaim Disk Space
        run: .github/ci-prerequisites.sh
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17
      - name: Create maven repo
        run: mkdir -p $HOME/release/repository
      - name: Build and Test
        run: |
          ./mvnw --settings .github/mvn-settings.xml \
            -B \
            -Dscan=false \
            -Dno-build-cache \
            -Ddevelocity.cache.local.enabled=false \
            -Ddevelocity.cache.remote.enabled=false \
            -Prelease \
            -DskipTests -DskipITs \
            -Ddokka \
            -Dno-test-modules \
            -Dgpg.skip \
            clean install
      - name: Report status
        if: always()
        uses: quarkusio/report-status-in-issue@main
        with:
          github-token: ${{ secrets.GITHUB_API_TOKEN }}
          status: ${{ job.status }}
          issue-repository: ${{ github.repository }}
          issue-number: 13058
          quarkus-sha: ${{ steps.quarkus-sha.outputs.sha }}
          project-sha: ${{ steps.quarkus-sha.outputs.sha }}
