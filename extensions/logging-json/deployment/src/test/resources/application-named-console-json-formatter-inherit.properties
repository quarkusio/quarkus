quarkus.log.level=INFO
quarkus.log.console.enabled=false

# Global JSON enabled — should be inherited by named handlers without explicit json config
quarkus.log.console.json.enabled=true

# Named handler without explicit json config — should inherit global JSON
quarkus.log.handler.console.inherit-console.enabled=true
quarkus.log.category."named.console.inherit".handlers=inherit-console
quarkus.log.category."named.console.inherit".use-parent-handlers=false

# Named handler with explicit json.enabled=false — should override global and use plain text
quarkus.log.handler.console.override-console.enabled=true
quarkus.log.handler.console.override-console.json.enabled=false
quarkus.log.category."named.console.override".handlers=override-console
quarkus.log.category."named.console.override".use-parent-handlers=false
