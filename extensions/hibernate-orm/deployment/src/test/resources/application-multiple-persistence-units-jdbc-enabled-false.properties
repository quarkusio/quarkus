quarkus.datasource.users.db-kind=h2
quarkus.datasource.users.jdbc.url=jdbc:h2:mem:jdbc-enabled-users

quarkus.datasource.inventory.db-kind=h2
quarkus.datasource.inventory.jdbc.url=jdbc:h2:mem:jdbc-enabled-inventory

quarkus.hibernate-orm."users".datasource=users
quarkus.hibernate-orm."users".packages=io.quarkus.hibernate.orm.multiplepersistenceunits.model.config.user
# Even though a JDBC datasource is available for "users", explicitly disable blocking bootstrap for this PU.
quarkus.hibernate-orm."users".jdbc=false

quarkus.hibernate-orm."inventory".schema-management.strategy=drop-and-create
quarkus.hibernate-orm."inventory".datasource=inventory
quarkus.hibernate-orm."inventory".packages=io.quarkus.hibernate.orm.multiplepersistenceunits.model.config.inventory

# In the logs we're seeing the reason why it's disabled
quarkus.log.category."io.quarkus.hibernate.orm.deployment.HibernateOrmProcessor".level=DEBUG
