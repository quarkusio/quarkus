name: "OWASP Dependency Check"

permissions:
  contents: read
  actions: write

# CI disabled for Vert.x 5 experimental branch - uncomment the 'on' triggers below to re-enable
#on:
#  workflow_dispatch:
#  schedule:
#    - cron: '0 0 * * 0,3'
on: [workflow_dispatch]

jobs:
  owasp:
    name: OWASP Dependency Check Report
    runs-on: ubuntu-latest
    if: github.repository == 'quarkusio/quarkus'

    strategy:
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 1
        ref: main
    - name: Extract base JDK version from POM
      id: base-jdk
      run: |
        BASE_JDK=$(grep -oP '<maven.compiler.release>\K[0-9]+' independent-projects/parent/pom.xml)
        echo "base-jdk-version=${BASE_JDK}" >> $GITHUB_OUTPUT
        echo "Base JDK version: ${BASE_JDK}"
    - name: Setup Java JDK ${{ steps.base-jdk.outputs.base-jdk-version }}
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        distribution: temurin
        java-version: ${{ steps.base-jdk.outputs.base-jdk-version }}

    - name: Generate cache key
      id: cache-key
      run: |
        CURRENT_BRANCH="${{ github.repository != 'quarkusio/quarkus' && 'fork' || github.base_ref || github.ref_name }}"
        CURRENT_MONTH=$(/bin/date -u "+%Y-%m")
        CURRENT_DAY=$(/bin/date -u "+%d")
        ROOT_CACHE_KEY="m2-cache"
        echo "m2-monthly-cache-key=${ROOT_CACHE_KEY}-${CURRENT_MONTH}" >> $GITHUB_OUTPUT
        echo "m2-monthly-branch-cache-key=${ROOT_CACHE_KEY}-${CURRENT_MONTH}-${CURRENT_BRANCH}" >> $GITHUB_OUTPUT
        echo "m2-cache-key=${ROOT_CACHE_KEY}-${CURRENT_MONTH}-${CURRENT_BRANCH}-${CURRENT_DAY}" >> $GITHUB_OUTPUT
    - name: Restore Maven Repository
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
      with:
        path: ~/.m2/repository
        key: ${{ steps.cache-key.outputs.m2-cache-key }}
        restore-keys: |
          ${{ steps.cache-key.outputs.m2-monthly-branch-cache-key }}-
          ${{ steps.cache-key.outputs.m2-monthly-cache-key }}-

    - name: Build Java
      run: ./mvnw -B --settings .github/mvn-settings.xml -Dquickly-ci install

    - name: Perform OWASP Dependency Check Report
      run: ./mvnw -Dowasp-report

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dependency-check-report
        path: target/dependency-check-report.html
        retention-days: 5
