name: Quarkus Release Test Build

permissions:
  contents: read
  issues: write
  packages: read

# CI disabled for Vert.x 5 experimental branch - uncomment the 'on' triggers below to re-enable
#on:
#  schedule:
#    - cron: '0 3 * * *'
on: [workflow_dispatch]
env:
  LANG: en_US.UTF-8
  MVNW_REPOURL: https://maven-central.storage-download.googleapis.com/maven2
jobs:
  build:
    name: "Prepare release"
    runs-on: ubuntu-latest
    if: github.repository == 'quarkusio/quarkus'
    env:
      MAVEN_OPTS: -Xmx2560m
      JBANG_REPO: $HOME/release/repository
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
      - name: Get SHA
        id: quarkus-sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Reclaim Disk Space
        run: .github/ci-prerequisites.sh
      - name: Extract base JDK version from POM
        id: base-jdk
        run: |
          BASE_JDK=$(grep -oP '<maven.compiler.release>\K[0-9]+' independent-projects/parent/pom.xml)
          echo "base-jdk-version=${BASE_JDK}" >> $GITHUB_OUTPUT
          echo "Base JDK version: ${BASE_JDK}"
      - name: Set up JDK ${{ steps.base-jdk.outputs.base-jdk-version }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: ${{ steps.base-jdk.outputs.base-jdk-version }}
      - name: Create maven repo
        run: mkdir -p $HOME/release/repository
      - name: Build and Test
        run: |
          ./mvnw --settings .github/mvn-settings.xml \
            -B \
            -Dscan=false \
            -Dno-build-cache \
            -Ddevelocity.cache.local.enabled=false \
            -Ddevelocity.cache.remote.enabled=false \
            -Prelease \
            -DskipTests -DskipITs \
            -Ddokka \
            -Dno-test-modules \
            -Dgpg.skip \
            clean install
      - name: Report status
        if: always()
        uses: quarkusio/report-status-in-issue@ee5fc1fa67e60f86018bef7d352e31eadf2dc588 # main
        with:
          github-token: ${{ secrets.GITHUB_API_TOKEN }}
          status: ${{ job.status }}
          issue-repository: ${{ github.repository }}
          issue-number: 13058
          quarkus-sha: ${{ steps.quarkus-sha.outputs.sha }}
          project-sha: ${{ steps.quarkus-sha.outputs.sha }}
