quarkus.log.level=INFO
quarkus.log.console.enabled=false
quarkus.log.socket.json.enabled=false

# Named JSON socket handler
quarkus.log.handler.socket.json-socket.enabled=true
quarkus.log.handler.socket.json-socket.endpoint=localhost:4560
quarkus.log.handler.socket.json-socket.json.enabled=true
quarkus.log.category."named.socket.json".handlers=json-socket
quarkus.log.category."named.socket.json".use-parent-handlers=false

# Named plain socket handler
quarkus.log.handler.socket.plain-socket.enabled=true
quarkus.log.handler.socket.plain-socket.endpoint=localhost:4561
quarkus.log.category."named.socket.plain".handlers=plain-socket
quarkus.log.category."named.socket.plain".use-parent-handlers=false
