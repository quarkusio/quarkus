quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test

#quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

quarkus.hibernate-orm.mapping.duration.preferred_jdbc_type=INTERVAL_SECOND
quarkus.hibernate-orm.mapping.duration.preferred_instant_jdbc_type=INSTANT

quarkus.hibernate-orm.mapping.preferred.boolean_jdbc_type=BIT
quarkus.hibernate-orm.mapping.preferred.uuid_jdbc_type=CHAR
