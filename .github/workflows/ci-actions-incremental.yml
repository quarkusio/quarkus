          ELAPSED=$((ELAPSED + 5))
          HEALTHSTATUS="`docker inspect -f '{{.State.Health.Status}}' oracle`"
          HEALTHSTATUS=${HEALTHSTATUS##+( )} #Remove longest matching series of spaces from the front
