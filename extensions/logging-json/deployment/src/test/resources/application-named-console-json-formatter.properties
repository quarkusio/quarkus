quarkus.log.level=INFO
quarkus.log.console.enabled=false
quarkus.log.console.json.enabled=false

# Named JSON console handler
quarkus.log.handler.console.json-console.enabled=true
quarkus.log.handler.console.json-console.json.enabled=true
quarkus.log.category."named.console.json".handlers=json-console
quarkus.log.category."named.console.json".use-parent-handlers=false

# Named plain console handler
quarkus.log.handler.console.plain-console.enabled=true
quarkus.log.category."named.console.plain".handlers=plain-console
quarkus.log.category."named.console.plain".use-parent-handlers=false

# Named console handler with json.enabled=false
quarkus.log.handler.console.disabled-json-console.enabled=true
quarkus.log.handler.console.disabled-json-console.json.enabled=false
quarkus.log.category."named.console.json.disabled".handlers=disabled-json-console
quarkus.log.category."named.console.json.disabled".use-parent-handlers=false
