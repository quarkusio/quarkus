name: Feature request / Enhancement
description: Request or propose a new feature/enhancement
labels: kind/enhancement
body:
  - type: markdown
    attributes:
      value: |
        When using AI tools (LLMs, agents, etc.) to help prepare this issue, please make sure you follow our [AI and LLM Usage Policy](https://github.com/quarkusio/quarkus/blob/main/AI_POLICY.md).
  - type: textarea
    id: description
    validations:
      required: true
    attributes:
      label: Description
      description: >-
        Describe the feature here.
  - type: textarea
    id: impl_ideas
    attributes:
      label: Implementation ideas
      description: >-
        If you have any implementation ideas, they can go here, however please note that all design change proposals should be posted to [the Quarkus developer mailing list](mailto:quarkus-dev@googlegroups.com) (or [the corresponding Google Group](https://groups.google.com/group/quarkus-dev); see [the decisions process document](https://github.com/quarkusio/quarkus/blob/main/DECISIONS.adoc) for more information