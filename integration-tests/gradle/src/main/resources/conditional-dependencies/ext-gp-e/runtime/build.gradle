plugins {
    id 'java-library'
    id 'maven-publish'
    id 'io.quarkus.extension'
}

dependencies {
    implementation platform("${quarkusPlatformGroupId}:${quarkusPlatformArtifactId}:${quarkusPlatformVersion}")
}

quarkusExtension {
    deploymentArtifact = "org.acme:ext-gp-e-deployment:1.0-SNAPSHOT"
    capabilities {
        requires 'cap.gp.y'
    }
}

publishing {
    publications {
        mavenJave(MavenPublication) {
            groupId = 'org.acme'
            artifactId = 'ext-gp-e'
            version = '1.0-SNAPSHOT'
            from components.java
        }
    }
}
