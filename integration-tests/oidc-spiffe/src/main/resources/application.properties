# Test resource provides its own Keycloak container
quarkus.keycloak.devservices.enabled=false

# OIDC tenant (code flow) with SPIFFE JWT-SVID
quarkus.oidc.application-type=web-app
quarkus.oidc.credentials.jwt.source=spiffe-jwt
quarkus.oidc.authentication.redirect-path=/spiffe/code-flow

# Named tenant for bearer token validation
quarkus.oidc.bearer.tenant-paths=/spiffe/bearer

quarkus.log.category."org.htmlunit.css".level=ERROR

# OIDC client — client_credentials grant with SPIFFE JWT-SVID
quarkus.oidc-client.credentials.jwt.source=spiffe-jwt
quarkus.oidc-client.grant.type=client
