---
name: Linting with Vale
on:
  pull_request:
    paths:
      - 'docs/src/main/asciidoc/**'
      - '.github/workflows/vale.yml'

concurrency:
  group: "workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}, pr = ${{ github.event.pull_request.id }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.repository != 'quarkusio/quarkus' }}

jobs:
  vale:
    name: Linting with Vale
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Vale Linter
        continue-on-error: true
        uses: vale-cli/vale-action@0135b9fe2b3107365569cc3142b9a1c85221ea2f
        with:
          fail_on_error: false
          vale_flags: "--no-exit --config=docs/.vale.ini"
          filter_mode: diff_context
          files: docs/src/main/asciidoc/
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
